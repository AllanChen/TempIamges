name: ImageHoverPreview
options:
  bundleIdPrefix: com.imagehoverpreview
  deploymentTarget:
    macOS: "12.3"
  xcodeVersion: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "12.3"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_IDENTITY: "-"

# Swift Package Manager 依赖配置
# 如需添加第三方库，取消注释并配置：
#
# packages:
#   # 远程依赖示例：
#   # Alamofire:
#   #   url: https://github.com/Alamofire/Alamofire
#   #   from: "5.9.0"
#   #
#   # 本地依赖示例：
#   # MyLocalPackage:
#   #   path: ../Packages/MyLocalPackage

targets:
  ImageHoverPreview:
    type: application
    platform: macOS
    sources:
      - Sources
    resources:
      - Resources
      - PreviewContent
    dependencies: []
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.imagehoverpreview.app
        INFOPLIST_FILE: Info.plist
        PRODUCT_NAME: ImageHoverPreview
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
        SWIFT_EMIT_LOC_STRINGS: YES
    entitlements:
      path: ImageHoverPreview.entitlements
      properties:
        com.apple.security.get-task-allow: true